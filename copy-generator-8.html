<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <title>Social Media Copy Generator — Visit Houthalen-Helchteren</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:    #95C120;
      --green-lt: #F0F7E0;
      --green-dk: #7aA010;
      --gray:     #F4F6F8;
      --border:   #D0D7E0;
      --text:     #1A2332;
      --muted:    #6B7A90;
      --radius:   10px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--gray);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--green);
      color: var(--text);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header svg { flex-shrink: 0; }
    header h1 { font-size: 1.2rem; font-weight: 700; line-height: 1.3; }
    header p  { font-size: 0.82rem; opacity: 0.75; }

    main {
      max-width: 780px;
      margin: 32px auto;
      padding: 0 16px 60px;
    }

    #key-notice {
      background: #FFF8E1;
      border: 1px solid #FFD54F;
      border-radius: var(--radius);
      padding: 14px 18px;
      font-size: 0.88rem;
      margin-bottom: 24px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    #key-notice input {
      margin-top: 8px;
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.9rem;
      font-family: monospace;
    }
    #key-notice label { font-weight: 600; display: block; margin-bottom: 4px; }
    #key-notice span  { line-height: 1.6; }

    .card {
      background: #fff;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 28px;
      margin-bottom: 24px;
    }
    .card h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--green-dk);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .tab {
      padding: 8px 18px;
      border-radius: 20px;
      border: 2px solid var(--border);
      background: #fff;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      transition: all .15s;
    }
    .tab.active {
      background: var(--green);
      border-color: var(--green);
      color: var(--text);
    }
    .tab:hover:not(.active) {
      border-color: var(--green);
      color: var(--green-dk);
    }

    .fields { display: grid; gap: 16px; }
    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .field input,
    .field textarea,
    .field select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      background: #fff;
      transition: border-color .15s;
    }
    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px var(--green-lt);
    }
    .field textarea { resize: vertical; min-height: 80px; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .slides-counter {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .slides-counter button {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      color: var(--green-dk);
      font-weight: 700;
      line-height: 1;
      transition: all .15s;
    }
    .slides-counter button:hover {
      background: var(--green);
      border-color: var(--green);
      color: var(--text);
    }
    .slides-counter span { font-weight: 700; font-size: 1rem; min-width: 24px; text-align: center; }

    #generate-btn {
      width: 100%;
      padding: 14px;
      background: var(--green);
      color: var(--text);
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    #generate-btn:hover:not(:disabled) { background: var(--green-dk); }
    #generate-btn:disabled { opacity: .6; cursor: not-allowed; }

    .spinner {
      width: 18px; height: 18px;
      border: 3px solid rgba(26,35,50,.25);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #results { display: none; }
    #results h2 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--green-dk);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .proposal {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .proposal-header {
      background: var(--green-lt);
      padding: 10px 16px;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--green-dk);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .copy-btn {
      background: var(--green);
      color: var(--text);
      border: none;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .copy-btn:hover  { background: var(--green-dk); }
    .copy-btn.copied { background: #4CAF50; color: #fff; }

    .proposal-body { padding: 16px; }
    .field-row { margin-bottom: 12px; }
    .field-row:last-child { margin-bottom: 0; }
    .field-row .lbl {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
      margin-bottom: 3px;
    }
    .field-row .val {
      font-size: 0.95rem;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .slide-block {
      border-left: 3px solid var(--green-lt);
      padding-left: 14px;
      margin-bottom: 12px;
    }
    .slide-block .slide-lbl {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--green-dk);
      margin-bottom: 4px;
    }

    #error-msg {
      background: #FFEBEE;
      border: 1px solid #EF9A9A;
      border-radius: var(--radius);
      padding: 14px 18px;
      font-size: 0.9rem;
      color: #C62828;
      display: none;
      margin-bottom: 16px;
    }

    @media (max-width: 520px) {
      .row-2 { grid-template-columns: 1fr; }
      header  { padding: 14px 16px; }
      .card   { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<header>
  <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
    <rect width="36" height="36" rx="8" fill="rgba(26,35,50,0.12)"/>
    <path d="M18 8 C13 8 9 12 9 17 C9 23 18 30 18 30 C18 30 27 23 27 17 C27 12 23 8 18 8Z" stroke="#1A2332" stroke-width="2.2" fill="none" stroke-linejoin="round"/>
    <circle cx="18" cy="17" r="3.5" fill="#1A2332"/>
  </svg>
  <div>
    <h1>Social Media Copy Generator</h1>
    <p>Visit Houthalen-Helchteren — Facebook &amp; Instagram</p>
  </div>
</header>

<main>

  <div id="key-notice" class="card">
    <span style="font-size:1.2rem">🔑</span>
    <div style="flex:1">
      <label for="api-key">Claude API-sleutel (Anthropic)</label>
      <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off" />
      <span>Vereist om copy te genereren. De sleutel wordt alleen lokaal in je browser gebruikt.</span>
    </div>
  </div>

  <div class="card">
    <h2>
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 8h10M7 12h6"/></svg>
      Posttype
    </h2>

    <div class="tabs">
      <button class="tab active" data-type="algemeen">Algemene post</button>
      <button class="tab" data-type="event">Event / kalender</button>
      <button class="tab" data-type="longform">Longform (slides)</button>
    </div>

    <div class="fields" id="form-fields"></div>

    <button id="generate-btn">
      <span id="btn-label">Genereer voorstellen</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </div>

  <div id="error-msg"></div>
  <div id="results" class="card">
    <h2>
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/></svg>
      Voorstellen
    </h2>
    <div id="proposals-container"></div>
  </div>

</main>

<script>
const PROXY = 'https://proxy.dimitrimeus.workers.dev';

const BRAND = 'Je schrijft social media copy voor Visit Houthalen-Helchteren, de toeristische arm van het gemeentebestuur van Houthalen-Helchteren (Vlaanderen).\n\n'
  + 'Huisstijl & tone of voice:\n'
  + '- Enthousiast en uitnodigend: wek zin om te bezoeken, ontdekken en beleven\n'
  + '- Warm en persoonlijk: spreek de lezer direct aan (je/jij), geen toeristische brochure-taal\n'
  + '- Verleidend en beeldend: gebruik zintuiglijke taal die sfeer oproept\n'
  + '- Trots op de streek: de natuur, het erfgoed, de mensen en de beleving staan centraal\n'
  + '- Kort en krachtig: elke zin telt\n'
  + '- Taal: Nederlands (Belgisch-Vlaams register, geen archaisme)\n'
  + '- Gebruik NOOIT een em dash (--) of gedachtestreepje in de tekst\n'
  + '- Het eerste voorstel heeft altijd een volzin als titel (met onderwerp en werkwoord)\n';

let postType = 'algemeen';
let slideCount = 3;

const tabs        = document.querySelectorAll('.tab');
const fieldsEl    = document.getElementById('form-fields');
const generateBtn = document.getElementById('generate-btn');
const btnLabel    = document.getElementById('btn-label');
const spinner     = document.getElementById('spinner');
const resultsEl   = document.getElementById('results');
const proposalsEl = document.getElementById('proposals-container');
const errorEl     = document.getElementById('error-msg');
const apiKeyEl    = document.getElementById('api-key');

tabs.forEach(function(t) {
  t.addEventListener('click', function() {
    tabs.forEach(function(x) { x.classList.remove('active'); });
    t.classList.add('active');
    postType = t.dataset.type;
    renderFields();
  });
});

function doelSelect() {
  return '<select id="f-doel">'
    + '<option value="">Kies doel...</option>'
    + '<option>Aanzetten tot actie</option>'
    + '<option>Informeren</option>'
    + '<option>Betrokkenheid vergroten</option>'
    + '</select>';
}

function renderFields() {
  var captionVeld = '<div class="field"><label>Beschrijving van de visual (voor caption)</label>'
    + '<textarea id="f-visual" placeholder="Bijv. foto van zonsondergang boven het Hageven, warme herfstkleuren"></textarea></div>';

  if (postType === 'algemeen') {
    fieldsEl.innerHTML = '<div class="field"><label>Onderwerp / thema</label>'
      + '<textarea id="f-onderwerp" placeholder="Bijv. wandelen in het Hageven-Plateaux"></textarea></div>'
      + '<div class="row-2">'
      + '<div class="field"><label>Doel van de post</label>' + doelSelect() + '</div>'
      + '<div class="field"><label>Doelgroep</label>'
      + '<input type="text" id="f-doelgroep" placeholder="Bijv. gezinnen, wandelaars, dagjesmensen" /></div>'
      + '</div>'
      + captionVeld;
  } else if (postType === 'event') {
    fieldsEl.innerHTML = '<div class="field"><label>Naam evenement</label>'
      + '<textarea id="f-onderwerp" placeholder="Bijv. zomerfestival op de markt"></textarea></div>'
      + '<div class="row-2">'
      + '<div class="field"><label>Datum &amp; tijdstip</label>'
      + '<input type="text" id="f-datum" placeholder="Bijv. za 21 juni, 14u-22u" /></div>'
      + '<div class="field"><label>Doelgroep</label>'
      + '<input type="text" id="f-doelgroep" placeholder="Bijv. locals en toeristen" /></div>'
      + '</div>'
      + '<div class="field"><label>Doel van de post</label>' + doelSelect() + '</div>'
      + captionVeld;
  } else {
    fieldsEl.innerHTML = '<div class="field"><label>Onderwerp / thema</label>'
      + '<textarea id="f-onderwerp" placeholder="Bijv. de mooiste fietsroutes in Houthalen-Helchteren"></textarea></div>'
      + '<div class="row-2">'
      + '<div class="field"><label>Doel van de post</label>' + doelSelect() + '</div>'
      + '<div class="field"><label>Doelgroep</label>'
      + '<input type="text" id="f-doelgroep" placeholder="Bijv. fietsers, families" /></div>'
      + '</div>'
      + '<div class="field"><label>Aantal extra slides (naast intro)</label>'
      + '<div class="slides-counter">'
      + '<button id="slides-min">-</button>'
      + '<span id="slides-val">' + slideCount + '</span>'
      + '<button id="slides-plus">+</button>'
      + '</div></div>'
      + captionVeld;
    document.getElementById('slides-min').addEventListener('click', function() {
      if (slideCount > 1) { slideCount--; document.getElementById('slides-val').textContent = slideCount; }
    });
    document.getElementById('slides-plus').addEventListener('click', function() {
      if (slideCount < 8) { slideCount++; document.getElementById('slides-val').textContent = slideCount; }
    });
  }
}

function buildPrompt() {
  var onderwerp = (document.getElementById('f-onderwerp') || {value:''}).value.trim();
  var doel      = (document.getElementById('f-doel')      || {value:''}).value;
  var doelgroep = (document.getElementById('f-doelgroep') || {value:''}).value.trim();
  var datum     = (document.getElementById('f-datum')     || {value:''}).value.trim();
  var visual    = (document.getElementById('f-visual')    || {value:''}).value.trim();
  var sfeer     = (document.getElementById('f-sfeer')     || {value:''}).value.trim();

  var typeInstructie = '';
  var structuur = '';

  var captionInstructie = '- "caption": begeleidende caption bij de visual (2-4 zinnen, prikkelende openingszin, geen hashtags)';

  if (postType === 'algemeen') {
    typeInstructie = 'Posttype: ALGEMENE POST\n'
      + 'Lever 3 verschillende voorstellen. Elk voorstel bevat:\n'
      + '- "titel": prikkelende titel (max 12 woorden)\n'
      + '- "subtitel": informatieve subtitel (max 25 woorden)\n'
      + captionInstructie;
    structuur = '{ "voorstellen": [ { "titel": "", "subtitel": "", "caption": "" } ] }';
  } else if (postType === 'event') {
    typeInstructie = 'Posttype: EVENT / KALENDER\n'
      + 'Lever 3 verschillende voorstellen. Elk voorstel bevat:\n'
      + '- "datum": opgemaakte datum/tijdstip\n'
      + '- "titel": prikkelende evenementtitel (max 12 woorden)\n'
      + captionInstructie;
    structuur = '{ "voorstellen": [ { "datum": "", "titel": "", "caption": "" } ] }';
  } else {
    typeInstructie = 'Posttype: LONGFORM (slides)\n'
      + 'Lever 2 verschillende versies. Elke versie bevat:\n'
      + '- "intro": object met "titel" en "subtitel"\n'
      + '- "slides": array van ' + slideCount + ' objecten, elk met "titel" (max 8 woorden) en "inhoud" (2-4 regels)\n'
      + '- ' + captionInstructie;
    structuur = '{ "versies": [ { "intro": { "titel": "", "subtitel": "" }, "slides": [ { "titel": "", "inhoud": "" } ], "caption": "" } ] }';
  }

  var briefing = 'Briefing:\n'
    + '- Onderwerp: ' + (onderwerp || '(niet opgegeven)') + '\n';
  if (datum) briefing += '- Datum: ' + datum + '\n';
  briefing += '- Doel: ' + (doel || '(niet opgegeven)') + '\n';
  briefing += '- Doelgroep: ' + (doelgroep || '(niet opgegeven)') + '\n';
  briefing += '- Visual: ' + (visual || '(niet opgegeven, schrijf een algemene caption passend bij het onderwerp)');

  return BRAND + '\n' + typeInstructie + '\n\n' + briefing
    + '\n\nGeef je antwoord als geldig JSON, enkel het JSON-object, geen uitleg errond.\nStructuur:\n' + structuur;
}

async function callClaude(prompt) {
  var apiKey = apiKeyEl.value.trim();
  if (!apiKey) throw new Error('Geen API-sleutel ingevuld. Vul je Claude API-sleutel in bovenaan de pagina.');

  var resp = await fetch(PROXY, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1800,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!resp.ok) {
    var err = await resp.json().catch(function() { return {}; });
    throw new Error((err.error && err.error.message) || ('API-fout ' + resp.status));
  }
  var data = await resp.json();
  return data.content[0].text;
}

function renderProposals(raw) {
  var parsed;
  try {
    var jsonStr = raw.replace(/^```json\s*/i, '').replace(/```\s*$/, '').trim();
    parsed = JSON.parse(jsonStr);
  } catch(e) {
    throw new Error('Kon de gegenereerde tekst niet verwerken. Probeer opnieuw.');
  }

  proposalsEl.innerHTML = '';

  if (postType === 'longform') {
    (parsed.versies || []).forEach(function(vers, i) {
      var div = document.createElement('div');
      div.className = 'proposal';
      var copyLines = ['INTRO\nTitel: ' + (vers.intro && vers.intro.titel) + '\nSubtitel: ' + (vers.intro && vers.intro.subtitel)];
      (vers.slides || []).forEach(function(s, si) {
        copyLines.push('\nSLIDE ' + (si+1) + '\nTitel: ' + s.titel + '\n' + s.inhoud);
      });
      if (vers.caption) copyLines.push('\nCAPTION\n' + vers.caption);
      var slidesHtml = (vers.slides || []).map(function(s, si) {
        return '<div class="slide-block"><div class="slide-lbl">Slide ' + (si+1) + '</div>'
          + '<div class="field-row"><div class="lbl">Titel</div><div class="val">' + esc(s.titel) + '</div></div>'
          + '<div class="field-row"><div class="lbl">Inhoud</div><div class="val">' + esc(s.inhoud) + '</div></div></div>';
      }).join('');
      div.innerHTML = '<div class="proposal-header">Versie ' + (i+1)
        + '<button class="copy-btn" data-text="' + encodeURIComponent(copyLines.join('\n')) + '">Kopieer</button></div>'
        + '<div class="proposal-body">'
        + '<div class="field-row"><div class="lbl">Intro - Titel</div><div class="val">' + esc(vers.intro && vers.intro.titel) + '</div></div>'
        + '<div class="field-row"><div class="lbl">Intro - Subtitel</div><div class="val">' + esc(vers.intro && vers.intro.subtitel) + '</div></div>'
        + slidesHtml
        + (vers.caption ? '<div class="field-row"><div class="lbl">Caption bij visual</div><div class="val">' + esc(vers.caption) + '</div></div>' : '')
        + '</div>';
      proposalsEl.appendChild(div);
    });
  } else {
    (parsed.voorstellen || []).forEach(function(v, i) {
      var div = document.createElement('div');
      div.className = 'proposal';
      var copyText = '';
      var bodyHtml = '';
      if (postType === 'algemeen') {
        copyText = v.titel + '\n' + v.subtitel + (v.caption ? '\n\nCaption:\n' + v.caption : '');
        bodyHtml = '<div class="field-row"><div class="lbl">Titel</div><div class="val">' + esc(v.titel) + '</div></div>'
          + '<div class="field-row"><div class="lbl">Subtitel</div><div class="val">' + esc(v.subtitel) + '</div></div>';
      } else {
        copyText = v.datum + '\n' + v.titel + (v.caption ? '\n\nCaption:\n' + v.caption : '');
        bodyHtml = '<div class="field-row"><div class="lbl">Datum</div><div class="val">' + esc(v.datum) + '</div></div>'
          + '<div class="field-row"><div class="lbl">Titel</div><div class="val">' + esc(v.titel) + '</div></div>';
      }
      if (v.caption) {
        bodyHtml += '<div class="field-row"><div class="lbl">Caption bij visual</div><div class="val">' + esc(v.caption) + '</div></div>';
      }
      div.innerHTML = '<div class="proposal-header">Voorstel ' + (i+1)
        + '<button class="copy-btn" data-text="' + encodeURIComponent(copyText) + '">Kopieer</button></div>'
        + '<div class="proposal-body">' + bodyHtml + '</div>';
      proposalsEl.appendChild(div);
    });
  }

  proposalsEl.querySelectorAll('.copy-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      navigator.clipboard.writeText(decodeURIComponent(btn.dataset.text)).then(function() {
        btn.textContent = 'Gekopieerd!';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'Kopieer'; btn.classList.remove('copied'); }, 2000);
      });
    });
  });
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

generateBtn.addEventListener('click', async function() {
  errorEl.style.display = 'none';
  resultsEl.style.display = 'none';
  btnLabel.textContent = 'Bezig met genereren...';
  spinner.style.display = 'block';
  generateBtn.disabled = true;

  try {
    var prompt = buildPrompt();
    var raw = await callClaude(prompt);
    renderProposals(raw);
    resultsEl.style.display = 'block';
    resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch(e) {
    errorEl.textContent = e.message;
    errorEl.style.display = 'block';
  } finally {
    btnLabel.textContent = 'Genereer voorstellen';
    spinner.style.display = 'none';
    generateBtn.disabled = false;
  }
});

renderFields();
</script>
</body>
</html>
